# Render.com Blueprint Configuration
# This file configures automatic deployment on Render.com
# Note: Frontend static site should be created manually via Render Dashboard

services:
  # Backend API Service
  - type: web
    name: animira-api
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BASE_URL
        value: https://animira-api.onrender.com
    healthCheckPath: /
    autoDeploy: true
