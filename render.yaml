# Render.com Blueprint Configuration
# This file configures automatic deployment on Render.com

services:
  # Frontend Static Site (short URL: animira.onrender.com)
  - type: web
    name: animira
    runtime: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: ./web/dist
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
    routes:
      - type: rewrite
        source: /api/*
        destination: https://animira-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend API Service
  - type: web
    name: animira-api
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BASE_URL
        value: https://animira-api.onrender.com
    healthCheckPath: /
    autoDeploy: true
