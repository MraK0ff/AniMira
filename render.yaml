# Render.com Blueprint Configuration
# Один сервис: API + Frontend вместе (проще для CORS и единый URL)

services:
  - type: web
    name: animira
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: |
      # Install backend dependencies
      pip install -r requirements.txt
      # Build frontend
      cd web && npm install && npm run build
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 22.12.0
      - key: ENVIRONMENT
        value: production
      - key: VITE_API_URL
        value: https://animira-api.onrender.com
    healthCheckPath: /api/
    autoDeploy: true
