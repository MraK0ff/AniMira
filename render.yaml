# Render.com Blueprint Configuration
# Единый сервис: API + Frontend на одном домене

services:
  - type: web
    name: animira
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      cd web && npm install && VITE_API_URL=/ npm run build && cd ..
      # Copy APK and version.json to deploy directory if they exist locally
      mkdir -p apk
      if [ -f "android-tv-webview/app/build/outputs/apk/debug/app-debug.apk" ]; then
        cp android-tv-webview/app/build/outputs/apk/debug/app-debug.apk apk/app-debug.apk
        echo "APK copied to deploy directory"
      fi
      if [ -f "android-tv-webview/apk/version.json" ]; then
        cp android-tv-webview/apk/version.json apk/version.json
        echo "version.json copied from gradle output"
      elif [ -f "apk/version.json" ]; then
        echo "version.json is in deploy directory"
      else
        echo "version.json not found - will use APK modification time"
      fi
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 22.12.0
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /api/
    autoDeploy: true
